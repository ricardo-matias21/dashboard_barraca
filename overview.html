  <script>
    $('#datetimepicker1').datetimepicker({
      format: 'DD-MM-YYYY HH:mm',
      icons: {
        time: 'far fa-clock',
        date: 'far fa-calendar-alt',
        up: 'fas fa-arrow-up',
        down: 'fas fa-arrow-down',
        previous: 'fas fa-chevron-left',
        next: 'fas fa-chevron-right',
        today: 'far fa-calendar-check',
        clear: 'far fa-trash-alt',
        close: 'fas fa-times'
      }
    });

    $('#datetimepicker2').datetimepicker({
      format: 'DD-MM-YYYY HH:mm',
      useCurrent: false, // prevent auto-setting to now / minDate
      icons: {
        time: 'far fa-clock',
        date: 'far fa-calendar-alt',
        up: 'fas fa-arrow-up',
        down: 'fas fa-arrow-down',
        previous: 'fas fa-chevron-left',
        next: 'fas fa-chevron-right',
        today: 'far fa-calendar-check',
        clear: 'far fa-trash-alt',
        close: 'fas fa-times'
      }
    });

    $("#datetimepicker1").on("change.datetimepicker", function (e) {
      // If we just clicked a quick-range tag, enforce minDate and preserve end unless it's < start
      if (window._qrIgnoreNextStartChange) {
        window._qrIgnoreNextStartChange = false;
        checkAndSelectMatchingTag();
        return;
      }

      checkAndSelectMatchingTag();
    });

    // Fallback for manual typing in the start input
    $('#inputStartDateTime').on('change blur', function () {
      var start = moment($(this).val(), 'DD-MM-YYYY HH:mm', true);
      if (!start.isValid()) return;

      if (window._qrIgnoreNextStartChange) {
        var prevEnd = $('#datetimepicker2').datetimepicker('date');
        $('#datetimepicker2').datetimepicker('minDate', start);

        if (prevEnd) {
          if (prevEnd.isBefore(start)) {
            $('#datetimepicker2').datetimepicker('date', start);
            $('#inputEndDateTime').val(start.format('DD-MM-YYYY HH:mm'));
          } else {
            $('#datetimepicker2').datetimepicker('date', prevEnd);
            $('#inputEndDateTime').val(prevEnd.format('DD-MM-YYYY HH:mm'));
          }
        }

        window._qrIgnoreNextStartChange = false;
        checkAndSelectMatchingTag();
        return;
      }

      $('#datetimepicker2').datetimepicker('minDate', start);
      var endMoment = $('#datetimepicker2').datetimepicker('date');
      if (endMoment && endMoment.isBefore(start)) {
        $('#datetimepicker2').datetimepicker('date', start);
        $('#inputEndDateTime').val(start.format('DD-MM-YYYY HH:mm'));
      }
      checkAndSelectMatchingTag();
    });

    function selectSearch() {
      var search = Number($("#search").val());

      if(search === 0) {
        $('#row_search').show();
        $('#expand').hide();
        $('#minimize').show();
        $('#search').val(1);
      }
      else{
        $('#row_search').hide();
        $('#expand').show();
        $('#minimize').hide();
        $('#search').val(0);
      }
    }

    function loader() {
      $('#btntext').hide();

      $('#loader').show();
    }
    function setActiveStates($activeBtn) {
      var $all = $('.js-day-btn');
      // Clear active state from all quick buttons
      $all.removeClass('active is-selected').attr({'aria-pressed':'false', 'data-selected':'false'});
      if ($activeBtn && $activeBtn.length) {
        $activeBtn.addClass('active is-selected').attr({'aria-pressed':'true', 'data-selected':'true'});
      }
    }

    // Tag-style quick range selection with toggle/deselect support
    function selectDayTag(tagId, start, end) {
      var $tag = $('#' + tagId);
      var isSelected = $tag.hasClass('selected');

      // Defaults from server (escape for JS)
      var defStart = '17\u002D10\u002D2024\u002023\u003A09';
      var defEnd   = '18\u002D03\u002D2026\u002012\u003A26';

      if (isSelected) {
        // Deselect: clear all and restore default event dates
        $('.quick-range-tag').removeClass('selected');

        // Inputs
        $('#inputStartDateTime').val(defStart);
        $('#inputEndDateTime').val(defEnd);

        // Pickers
        var mDefStart = moment(defStart, 'DD-MM-YYYY HH:mm');
        var mDefEnd   = moment(defEnd,   'DD-MM-YYYY HH:mm');

        if ($('#datetimepicker1').data('datetimepicker')) {
          $('#datetimepicker1').datetimepicker('date', mDefStart);
        }
        if ($('#datetimepicker2').data('datetimepicker')) {
          $('#datetimepicker2').datetimepicker('minDate', mDefStart);
          $('#datetimepicker2').datetimepicker('date', mDefEnd);
        }

        checkAndSelectMatchingTag();
        return;
      }

      // Select: mark only this tag and apply its range
      window._qrIgnoreNextStartChange = true;
      $('.quick-range-tag').removeClass('selected');
      $tag.addClass('selected');

      // Inputs
      $('#inputStartDateTime').val(start);
      $('#inputEndDateTime').val(end);

      // Pickers
      var mStart = moment(start, 'DD-MM-YYYY HH:mm');
      var mEnd   = moment(end,   'DD-MM-YYYY HH:mm');

      if ($('#datetimepicker1').data('datetimepicker')) {
        $('#datetimepicker1').datetimepicker('date', mStart);
      }
      if ($('#datetimepicker2').data('datetimepicker')) {
        $('#datetimepicker2').datetimepicker('minDate', mStart);
        $('#datetimepicker2').datetimepicker('date', mEnd);
      }

      checkAndSelectMatchingTag();
    }

    function clearSelectedDayTags() {
      $('.quick-range-tag').removeClass('selected');
    }
    // Listen for changes on the end date picker to clear selected day tags
    $("#datetimepicker2").on("change.datetimepicker", function (e) {
      checkAndSelectMatchingTag();
    });

    function checkAndSelectMatchingTag() {
      const curStart = $('#inputStartDateTime').val();
      const curEnd = $('#inputEndDateTime').val();
      let matched = false;

      $('.quick-range-tag').each(function () {
        const $tag = $(this);
        const onclickAttr = $tag.attr('onclick');
        if (onclickAttr.includes(curStart) && onclickAttr.includes(curEnd)) {
          $('.quick-range-tag').removeClass('selected');
          $tag.addClass('selected');
          matched = true;
          return false; // break loop
        }
      });

      if (!matched) {
        $('.quick-range-tag').removeClass('selected');
      }
    }



    // On load: mark the matching tag as selected if inputs equal a preset range; otherwise, mark none selected
    $(function initActiveQuickFilter() {
      var curStart = $('#inputStartDateTime').val();
      var curEnd   = $('#inputEndDateTime').val();
      var matched  = false;

      $('.quick-range-tag').each(function () {
        var $tag = $(this);
        if ($tag.attr('onclick').includes(curStart) && $tag.attr('onclick').includes(curEnd)) {
          $tag.addClass('selected');
          matched = true;
          return false;
        }
      });

      if (!matched) {
        $('.quick-range-tag').removeClass('selected');
      }
    });
  </script>

<script>
  // Open dynamic right-panel modal and lazy-load its content from data-modal-url
  jQuery(document).on('click', '.js-open-item-modal', function (e) {
    e.preventDefault();
    var url = jQuery(this).data('modal-url');
    var $modal = jQuery('#dynamicModal');
    var $content = $modal.find('.modal-content');
    // Show CSS-only loader
    $content.html(
      '<div class="modal-body p-5 text-center">' +
        '<div class="loader-spinner" aria-hidden="true"></div>' +
      '</div>'
    );
    $modal.modal('show');
    if (!url) {
      $content.html('<div class="modal-body p-4 text-danger">URL da modal em falta.</div>');
      return;
    }
    jQuery.get(url)
      .done(function (html) {
        try {
          if (!html || (typeof html === 'string' && html.trim() === '')) {
            $content.html('<div class="modal-body p-4 text-muted">Sem dados para os filtros selecionados.</div>');
            return;
          }
          var $fragment = jQuery( jQuery.parseHTML(html, document, true) );
          var $modalContent = $fragment.filter('.modal-content').add($fragment.find('.modal-content'));
          if ($modalContent.length) {
            $content.html($modalContent.first().html());
          } else {
            $content.html($fragment);
          }
          if (jQuery.fn.modal) {
            $modal.modal('handleUpdate');
          }
        } catch (e) {
          console.error('[total modal] parse error', e);
          $content.html('<div class="modal-body p-4 text-danger">Ocorreu um erro ao processar a resposta.</div>');
        }
      })
      .fail(function (jqXHR, textStatus) {
        console.error('[total modal] GET failed', textStatus, jqXHR.status, jqXHR.responseText);
        $content.html('<div class="modal-body p-4 text-danger">Não foi possível carregar os detalhes. (' + jqXHR.status + ' ' + textStatus + ')</div>');
      });
  });
  // Ensure a CSS-only loader works even without Bootstrap spinners
  (function ensureLoaderCSS(){
    if (!document.getElementById('dynamicModalLoaderStyles')) {
      var style = document.createElement('style');
      style.id = 'dynamicModalLoaderStyles';
      style.type = 'text/css';
      style.textContent =
        '#dynamicModal .loader-spinner{display:inline-block;width:40px;height:40px;border:4px solid rgba(0,0,0,0.12);border-top-color:rgba(0,0,0,0.6);border-radius:50%;animation:modal-spin 0.9s linear infinite}' +
        '@keyframes modal-spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(style);
    }
  })();
</script>
