<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard - Barraca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; background-color: black; margin: 0; padding: 0; }
        .bar { transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Helpers para TV - Escala baseada na altura do ecrã */
        .text-header { font-size: 4vh; }
        .text-giant { font-size: 12vh; line-height: 1; }
        .text-label { font-size: 3.5vh; }
        .text-battle { font-size: 5vh; }
    </style>
</head>
<body class="text-white h-screen w-screen relative">
    
    <div id="normalMode" class="h-full w-full flex flex-col p-[2vh] hidden relative">
        <h1 class="h-[8vh] text-header font-bold text-center uppercase tracking-widest text-gray-400 flex items-center justify-center">
            Consumos da Barraca
        </h1>
        
        <div class="h-[62vh] flex justify-around items-end gap-[2vw] px-[2vw] pb-[2vh]">
            <div id="colFino" class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-2xl border-b-8 border-yellow-500 transition-all duration-1000">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-[4vh] z-10">
                    <div class="text-giant font-black text-yellow-400 drop-shadow-2xl" id="qtyFino">0</div>
                    <div class="text-label font-bold tracking-wider text-yellow-500 uppercase bg-black/50 px-4 py-1 rounded-xl">Fino</div>
                </div>
                <div id="barFino" class="bar w-full bg-gradient-to-t from-yellow-800 to-yellow-400 opacity-80" style="height: 0%;"></div>
            </div>

            <div id="colShots" class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-2xl border-b-8 border-blue-500 transition-all duration-1000">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-[4vh] z-10">
                    <div class="text-giant font-black text-blue-400 drop-shadow-2xl" id="qtyShots">0</div>
                    <div class="text-label font-bold tracking-wider text-blue-500 uppercase bg-black/50 px-4 py-1 rounded-xl">Shots</div>
                </div>
                <div id="barShots" class="bar w-full bg-gradient-to-t from-blue-800 to-blue-400 opacity-80" style="height: 0%;"></div>
            </div>

            <div id="colCurso" class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-2xl border-b-8 border-rose-500 transition-all duration-1000">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-[4vh] z-10">
                    <div class="text-giant font-black text-rose-400 drop-shadow-2xl" id="qtyCurso">0</div>
                    <div class="text-label font-bold tracking-wider text-rose-500 uppercase bg-black/50 px-4 py-1 rounded-xl">Curso</div>
                </div>
                <div id="barCurso" class="bar w-full bg-gradient-to-t from-rose-800 to-rose-400 opacity-80" style="height: 0%;"></div>
            </div>

            <div id="colSidra" class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-2xl border-b-8 border-emerald-500 transition-all duration-1000">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-[4vh] z-10">
                    <div class="text-giant font-black text-emerald-400 drop-shadow-2xl" id="qtySidra">0</div>
                    <div class="text-label font-bold tracking-wider text-emerald-500 uppercase bg-black/50 px-4 py-1 rounded-xl">Sidra</div>
                </div>
                <div id="barSidra" class="bar w-full bg-gradient-to-t from-emerald-800 to-emerald-400 opacity-80" style="height: 0%;"></div>
            </div>
        </div>

        <div class="h-[25vh] w-full bg-gray-900 rounded-3xl p-[2vh] border-4 border-gray-800 relative z-20 flex flex-col justify-center">
            <h3 class="text-center text-gray-400 uppercase tracking-widest font-black mb-2 text-[2.5vh]">Batalha de Shots - Eles vs Elas</h3>
            <div class="flex justify-between w-full text-battle font-black px-8 mb-2">
                <span class="text-cyan-400">ELES - <span id="qtyShotsHomem">0</span></span>
                <span class="text-pink-400">ELAS - <span id="qtyShotsMulher">0</span></span>
            </div>
            <div class="w-full h-[6vh] bg-black rounded-full overflow-hidden flex border-2 border-gray-700">
                <div id="barShotsHomem" class="h-full bg-gradient-to-r from-cyan-900 to-cyan-400 transition-all duration-1000" style="width: 50%;"></div>
                <div id="barShotsMulher" class="h-full bg-gradient-to-l from-pink-900 to-pink-400 transition-all duration-1000" style="width: 50%;"></div>
            </div>
        </div>
    </div>

    <div id="arraialMode" class="h-full w-full flex flex-col items-center justify-center hidden relative" style="background: radial-gradient(circle at 50% 120%, #f59e0b, #78350f 100%);">
        <h1 class="text-[7vh] font-black text-white mb-[5vh] z-10 tracking-widest italic drop-shadow-lg text-center">
            ESTATÍSTICAS DO <span class="text-yellow-300 uppercase">Arraial</span>
        </h1>
        
        <div class="flex gap-[4vw] w-full justify-center px-[5vw] z-10">
            <div class="bg-black/70 p-[4vh] rounded-[2rem] border-t-8 border-yellow-400 shadow-2xl flex flex-col items-center flex-1 max-w-[40vw]">
                <div class="text-[8vh] mb-2">🛢️</div>
                <div class="text-gray-300 text-[3vh] uppercase font-bold">Barris</div>
                <div class="text-[14vh] font-black text-white leading-none font-mono" id="qtyBarris">0,0</div>
            </div>

            <div class="bg-black/70 p-[4vh] rounded-[2rem] border-t-8 border-yellow-200 shadow-2xl flex flex-col items-center flex-1 max-w-[40vw]">
                <div class="text-[8vh] mb-2">🍺</div>
                <div class="text-gray-300 text-[3vh] uppercase font-bold">Litros</div>
                <div class="text-[14vh] font-black text-white leading-none font-mono" id="qtyLitros">0</div>
            </div>
        </div>

        <div class="w-[80vw] mt-[5vh] bg-black/60 rounded-3xl p-[3vh] border-4 border-yellow-600/50 z-10">
            <div class="flex justify-between w-full text-battle font-black px-6 mb-2">
                <span class="text-cyan-400">ELES: <span id="qtyArraialHomem">0</span></span>
                <span class="text-pink-400">ELAS: <span id="qtyArraialMulher">0</span></span>
            </div>
            <div class="w-full h-[5vh] bg-black rounded-full overflow-hidden flex border-2 border-yellow-700">
                <div id="barArraialHomem" class="h-full bg-cyan-600 transition-all duration-1000" style="width: 50%;"></div>
                <div id="barArraialMulher" class="h-full bg-pink-600 transition-all duration-1000" style="width: 50%;"></div>
            </div>
        </div>
    </div>

    <div id="alertOverlay" class="absolute inset-0 bg-red-600 z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-500">
        <img id="alertImg" src="" class="max-h-[50vh] max-w-[80vw] rounded-3xl shadow-2xl mb-8 border-8 border-white hidden object-cover">
        <h2 id="alertText" class="text-[10vh] font-black text-white text-center uppercase leading-tight px-10"></h2>
    </div>

    <script>
        // O JAVASCRIPT PERMANECE IGUAL PARA MANTER A TUA LÓGICA
        const socket = io();
        const normalMode = document.getElementById('normalMode');
        const arraialMode = document.getElementById('arraialMode');
        const alertOverlay = document.getElementById('alertOverlay');
        const alertImg = document.getElementById('alertImg');
        const alertTextEl = document.getElementById('alertText');
        let alertTimeout;

        function animateValue(obj, start, end, duration, formatDecimal=false) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                if(!formatDecimal) {
                    obj.innerText = Math.floor(progress * (end - start) + start);
                } else {
                    obj.innerText = (progress * (end - start) + parseFloat(start)).toFixed(1).replace('.', ',');
                }
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        socket.on('update', (state) => {
            const { config, metrics } = state;
            if (config.modoArraial) {
                normalMode.classList.add('hidden');
                arraialMode.classList.remove('hidden');
                const barris = (metrics.arraial / 200).toFixed(1);
                const litros = Math.floor(metrics.arraial / 5);
                animateValue(document.getElementById('qtyBarris'), parseFloat(document.getElementById('qtyBarris').innerText.replace(',','.')), barris, 1000, true);
                animateValue(document.getElementById('qtyLitros'), parseInt(document.getElementById('qtyLitros').innerText), litros, 1000, false);
            } else {
                normalMode.classList.remove('hidden');
                arraialMode.classList.add('hidden');
                ['Fino', 'Shots', 'Curso', 'Sidra'].forEach(m => {
                    const el = document.getElementById('qty' + m);
                    const val = metrics[m.toLowerCase()];
                    if(parseInt(el.innerText) !== val) animateValue(el, parseInt(el.innerText), val, 1000);
                    const max = Math.max(metrics.fino, metrics.shots, metrics.curso, metrics.sidra, 1);
                    document.getElementById('bar' + m).style.height = (Math.sqrt(val) / Math.sqrt(max) * 90) + '%';
                });
            }
        });

        socket.on('alert', (data) => {
            alertOverlay.classList.remove('hidden');
            setTimeout(() => alertOverlay.style.opacity = "1", 50);
            if(data.image) { alertImg.src = data.image; alertImg.classList.remove('hidden'); }
            alertTextEl.innerText = data.text || '';
            setTimeout(() => {
                alertOverlay.style.opacity = "0";
                setTimeout(() => alertOverlay.classList.add('hidden'), 500);
            }, (data.duration || 15) * 1000);
        });
    </script>
</body>
</html>
