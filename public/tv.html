<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard - Barraca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; background-color: black; }
        .bar { transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-white h-screen w-screen relative">
    
    <!-- MODO NORMAL -->
    <div id="normalMode" class="h-full flex flex-col p-8 hidden">
        <h1 class="text-5xl font-bold text-center mb-8 uppercase tracking-widest text-gray-300">Consumos da Barraca</h1>
        <div class="flex-1 flex justify-around items-end gap-10 h-full pb-10">
            <!-- Coluna: Fino -->
            <div class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-[0_0_30px_rgba(255,215,0,0.15)] border-b-8 border-yellow-500">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-12 z-10">
                    <div class="text-[8rem] font-bold text-yellow-400 drop-shadow-2xl leading-none" id="qtyFino">0</div>
                    <div class="text-5xl font-bold tracking-wider text-yellow-500 uppercase drop-shadow-md bg-black/50 px-6 py-2 rounded-xl">Fino</div>
                </div>
                <div id="barFino" class="bar w-full bg-gradient-to-t from-yellow-800 to-yellow-400 opacity-80" style="height: 0%;"></div>
            </div>

            <!-- Coluna: Shots -->
            <div class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-[0_0_30px_rgba(59,130,246,0.15)] border-b-8 border-blue-500">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-12 z-10">
                    <div class="text-[8rem] font-bold text-blue-400 drop-shadow-2xl leading-none" id="qtyShots">0</div>
                    <div class="text-5xl font-bold tracking-wider text-blue-500 uppercase drop-shadow-md bg-black/50 px-6 py-2 rounded-xl">Shots</div>
                </div>
                <div id="barShots" class="bar w-full bg-gradient-to-t from-blue-800 to-blue-400 opacity-80" style="height: 0%;"></div>
            </div>

            <!-- Coluna: Curso -->
            <div class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-[0_0_30px_rgba(244,63,94,0.15)] border-b-8 border-rose-500">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-12 z-10">
                    <div class="text-[8rem] font-bold text-rose-400 drop-shadow-2xl leading-none" id="qtyCurso">0</div>
                    <div class="text-5xl font-bold tracking-wider text-rose-500 uppercase drop-shadow-md bg-black/50 px-6 py-2 rounded-xl">Beb. Curso</div>
                </div>
                <div id="barCurso" class="bar w-full bg-gradient-to-t from-rose-800 to-rose-400 opacity-80" style="height: 0%;"></div>
            </div>

            <!-- Coluna: Sidra -->
            <div class="flex flex-col items-center justify-end h-full w-1/4 relative bg-gray-900 rounded-t-2xl overflow-hidden shadow-[0_0_30px_rgba(16,185,129,0.15)] border-b-8 border-emerald-500">
                <div class="absolute inset-0 flex flex-col items-center justify-between py-12 z-10">
                    <div class="text-[8rem] font-bold text-emerald-400 drop-shadow-2xl leading-none" id="qtySidra">0</div>
                    <div class="text-5xl font-bold tracking-wider text-emerald-500 uppercase drop-shadow-md bg-black/50 px-6 py-2 rounded-xl">Sidra</div>
                </div>
                <div id="barSidra" class="bar w-full bg-gradient-to-t from-emerald-800 to-emerald-400 opacity-80" style="height: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- FUN ARRAIAL BACKGROUND CSS -->
    <style>
        .beer-bg {
            background-color: #d97706; /* amber-600 */
            background-image: radial-gradient(circle at 50% 120%, rgba(253, 224, 71, 0.4), rgba(217, 119, 6, 0.9) 60%, #78350f 100%);
            overflow: hidden;
            position: relative;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            bottom: -50px;
            animation: rise infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }
    </style>

    <!-- MODO ARRAIAL -->
    <div id="arraialMode" class="h-full flex flex-col items-center justify-center hidden beer-bg">
        
        <!-- Animated Bubbles injected manually for CSS -->
        <div class="bubble" style="left: 10%; width: 20px; height: 20px; animation-duration: 4s; animation-delay: 0s;"></div>
        <div class="bubble" style="left: 25%; width: 35px; height: 35px; animation-duration: 6s; animation-delay: 1s;"></div>
        <div class="bubble" style="left: 45%; width: 15px; height: 15px; animation-duration: 3s; animation-delay: 2s;"></div>
        <div class="bubble" style="left: 60%; width: 45px; height: 45px; animation-duration: 7s; animation-delay: 0.5s;"></div>
        <div class="bubble" style="left: 75%; width: 25px; height: 25px; animation-duration: 5s; animation-delay: 1.5s;"></div>
        <div class="bubble" style="left: 85%; width: 10px; height: 10px; animation-duration: 3.5s; animation-delay: 0.2s;"></div>

        <h1 class="text-[5.5rem] font-black text-white mb-20 z-10 tracking-[0.2em] font-serif italic drop-shadow-[0_5px_5px_rgba(0,0,0,0.6)]">
            Estatísticas do <span class="text-yellow-300">Arraial</span>
        </h1>
        
        <div class="flex gap-16 w-full justify-center px-10 z-10">
            <!-- Barris -->
            <div class="bg-gradient-to-br from-black/60 to-black/90 p-12 rounded-[3rem] border-t-8 border-l-8 border-yellow-400 shadow-[20px_20px_60px_rgba(0,0,0,0.7)] flex flex-col items-center flex-1 max-w-2xl transform transition-transform duration-500 hover:scale-105 backdrop-blur-sm">
                <div class="text-[9.5rem] mb-6 drop-shadow-lg leading-none transform -rotate-12">🛢️</div>
                <div class="bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-3xl uppercase tracking-widest mb-6">Totais Abertos</div>
                <div class="font-bold text-gray-300 text-5xl mb-2">Barris</div>
                <div class="text-[14rem] font-black text-white drop-shadow-[0_0_40px_rgba(250,204,21,1)] leading-none font-mono" id="qtyBarris">0.0</div>
            </div>

            <!-- Litros -->
            <div class="bg-gradient-to-br from-black/60 to-black/90 p-12 rounded-[3rem] border-t-8 border-l-8 border-yellow-200 shadow-[20px_20px_60px_rgba(0,0,0,0.7)] flex flex-col items-center flex-1 max-w-2xl transform transition-transform duration-500 hover:scale-105 backdrop-blur-sm">
                <div class="text-[9.5rem] mb-6 drop-shadow-lg leading-none transform rotate-12">🍺</div>
                <div class="bg-yellow-300 text-black px-6 py-2 rounded-full font-black text-3xl uppercase tracking-widest mb-6">Cerveja Bebida</div>
                <div class="font-bold text-gray-300 text-5xl mb-2">Litros</div>
                <div class="text-[14rem] font-black text-white drop-shadow-[0_0_40px_rgba(253,224,71,1)] leading-none font-mono" id="qtyLitros">0</div>
            </div>
        </div>
    </div>


    <!-- ALERT OVERLAY -->
    <div id="alertOverlay" class="absolute inset-0 bg-red-600/95 z-50 flex flex-col items-center justify-center hidden backdrop-blur-md transition-all duration-500 scale-95 opacity-0">
        <img id="alertImg" src="" alt="Alerta" class="max-h-[50vh] max-w-[80vw] rounded-3xl shadow-2xl mb-12 border-8 border-white hidden object-cover">
        <h2 id="alertText" class="whitespace-pre-line text-[8rem] font-black text-white text-center drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] uppercase leading-tight max-w-[90vw]"></h2>
    </div>

    <script>
        const socket = io();

        // Containers
        const normalMode = document.getElementById('normalMode');
        const arraialMode = document.getElementById('arraialMode');
        
        // Elementos Normal
        const qtyFino = document.getElementById('qtyFino');
        const barFino = document.getElementById('barFino');
        const qtyShots = document.getElementById('qtyShots');
        const barShots = document.getElementById('barShots');
        const qtyCurso = document.getElementById('qtyCurso');
        const barCurso = document.getElementById('barCurso');
        const qtySidra = document.getElementById('qtySidra');
        const barSidra = document.getElementById('barSidra');

        // Elementos Arraial
        const qtyBarris = document.getElementById('qtyBarris');
        const qtyLitros = document.getElementById('qtyLitros');
        
        // Elementos Alerta
        const alertOverlay = document.getElementById('alertOverlay');
        const alertImg = document.getElementById('alertImg');
        const alertTextEl = document.getElementById('alertText');
        
        let alertTimeout;

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Tratar decimais caso seja número float (Barris) vs Inteiros
                if(Number.isInteger(end)) {
                    obj.innerText = Math.floor(progress * (end - start) + start);
                } else {
                    obj.innerText = (progress * (end - start) + parseFloat(start)).toFixed(1);
                }

                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = end;
                }
            };
            window.requestAnimationFrame(step);
        }

        function updateElementWithAnimation(el, newValue) {
            const currentObjValue = parseFloat(el.innerText) || 0;
            const targetVal = parseFloat(newValue) || 0;
            
            if (currentObjValue !== targetVal) {
                // Determine if it should be an integer
                const finalValue = Number.isInteger(Number(newValue)) && !String(newValue).includes('.') ? parseInt(newValue) : parseFloat(newValue);
                animateValue(el, currentObjValue, finalValue, 1000); // 1s animation
            }
        }

        socket.on('update', (state) => {
            const { config, metrics } = state;
            
            if (config.modoArraial) {
                if(arraialMode.classList.contains('hidden')) {
                    normalMode.classList.add('hidden');
                    arraialMode.classList.remove('hidden');
                    arraialMode.classList.add('fade-in');
                }
                
                const barris = (metrics.arraial / 200).toFixed(1);
                const litros = Math.floor(metrics.arraial / 5);
                
                updateElementWithAnimation(qtyBarris, barris);
                updateElementWithAnimation(qtyLitros, litros);

            } else {
                if(normalMode.classList.contains('hidden')) {
                    arraialMode.classList.add('hidden');
                    normalMode.classList.remove('hidden');
                    normalMode.classList.add('fade-in');
                }

                updateElementWithAnimation(qtyFino, metrics.fino);
                updateElementWithAnimation(qtyShots, metrics.shots);
                updateElementWithAnimation(qtyCurso, metrics.curso);
                updateElementWithAnimation(qtySidra, metrics.sidra);

                const values = [metrics.fino, metrics.shots, metrics.curso, metrics.sidra];
                const dynamicMax = Math.max(...values, 1);
                
                // Usamos uma escala pela raiz quadrada. 
                // Isto retira a agressividade da diferença, fazendo um produto com 2000 parecer apenas 
                // sensivelmente o dobro de um de 500 na barra (e não 4x mais), equilibrando brutalmente o ecrã.
                const rootMax = Math.sqrt(dynamicMax);

                const calcHeight = (val) => {
                    if (val === 0) return 5;
                    const smoothedPercentage = (Math.sqrt(val) / rootMax) * 100;
                    // 15% minimo base (para que nunca fique num buraco) até 90% no grande vencedor
                    return 15 + (smoothedPercentage * 0.75);
                };

                barFino.style.height = `${calcHeight(metrics.fino)}%`;
                barShots.style.height = `${calcHeight(metrics.shots)}%`;
                barCurso.style.height = `${calcHeight(metrics.curso)}%`;
                barSidra.style.height = `${calcHeight(metrics.sidra)}%`;
            }
        });

        socket.on('alert', (data) => {
            clearTimeout(alertTimeout);
            
            alertOverlay.classList.remove('hidden');
            // Timeout para dar trigger na transition do tailwind
            setTimeout(() => {
                alertOverlay.classList.remove('scale-95', 'opacity-0');
                alertOverlay.classList.add('scale-100', 'opacity-100');
            }, 50);

            if(data.image) {
                alertImg.src = data.image;
                alertImg.classList.remove('hidden');
            } else {
                alertImg.classList.add('hidden');
                alertImg.src = '';
            }

            if(data.text) {
                alertTextEl.innerText = data.text;
                alertTextEl.classList.remove('hidden');
            } else {
                alertTextEl.classList.add('hidden');
                alertTextEl.innerText = '';
            }

            const durationMs = (data.duration || 15) * 1000;

            alertTimeout = setTimeout(() => {
                alertOverlay.classList.remove('scale-100', 'opacity-100');
                alertOverlay.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    alertOverlay.classList.add('hidden');
                }, 500); // Wait for fade out to hide
            }, durationMs);
        });
    </script>
</body>
</html>
